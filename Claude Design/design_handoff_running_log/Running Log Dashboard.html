  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Dark palette */
    --bg-base: #0d1117;
    --bg-surface: #161b22;
    --bg-elevated: #1c2230;
    --bg-glass: rgba(22, 27, 34, 0.7);
    --border: rgba(48, 54, 61, 0.8);

    /* Text */

    --text-secondary: #8b949e;
    --text-tertiary: #484f58;

    /* Accent */
    --accent: #58a6ff;
    --accent-glow: rgba(88, 166, 255, 0.15);
    --accent-dim: rgba(88, 166, 255, 0.08);

    /* Workout type colors */
    --color-easy: #2dd4bf;      /* teal */
    --color-tempo: #f59e0b;     /* amber */
    --color-long: #a78bfa;      /* violet */
    --color-race: #f87171;      /* coral */

    /* Typography */
    --font-sans: 'Geist', system-ui, sans-serif;
    --font-mono: 'Geist Mono', 'Fira Code', monospace;

    /* Sidebar */
    --sidebar-width: 220px;
    --sidebar-collapsed: 60px;

    /* Motion */
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --dur-fast: 120ms;
    --dur-med: 240ms;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg-base: #f6f8fa;
      --bg-surface: #ffffff;
      --bg-elevated: #f0f2f5;
      --bg-glass: rgba(255, 255, 255, 0.8);
      --border: rgba(208, 215, 222, 0.9);
      --border-subtle: rgba(208, 215, 222, 0.5);
      --text-primary: #1a2332;
      --text-secondary: #57606a;
      --text-tertiary: #afb8c1;
      --accent: #0969da;
      --accent-glow: rgba(9, 105, 218, 0.1);
      --accent-dim: rgba(9, 105, 218, 0.05);
    }
  }

  html, body, #root {
    height: 100%;
    font-family: var(--font-sans);
    background: var(--bg-base);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

  /* Keyframes */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

// Generate heatmap data
function generateHeatmap() {
  const years = {};
  const workoutTypes = ['easy','easy','easy','tempo','long','workout','race'];
  for (let y = 2003; y <= 2007; y++) {
    const weeks = [];
    const start = y === 2003 ? 32 : 0;
    const end = y === 2007 ? 20 : 52;
    for (let w = start; w < end; w++) {
      const days = [];
      for (let d = 0; d < 7; d++) {
        const hasRun = Math.random() > 0.28;
        const miles = hasRun ? Math.round(4 + Math.random() * 10) : 0;
        const type = hasRun ? workoutTypes[Math.floor(Math.random() * workoutTypes.length)] : 'rest';
        days.push({ miles, type });
      }
      weeks.push(days);
    }
    years[y] = weeks;
  }
  return years;
}
const HEATMAP_DATA = generateHeatmap();

// Weekly volume data
function generateWeeklyVolume() {
  const data = [];
  let date = new Date('2003-08-31');
  let baseWeek = 35;
  for (let i = 0; i < 200; i++) {
    const week = new Date(date);
    week.setDate(week.getDate() + i * 7);
    const seasonal = 1 + 0.3 * Math.sin(i / 52 * Math.PI * 2 - 1);
    const miles = Math.max(0, Math.round((baseWeek * seasonal + (Math.random() - 0.5) * 12)));
    data.push({ date: week, miles, week: i });
  }
  return data;
}
const WEEKLY_VOLUME = generateWeeklyVolume();

// Cumulative mileage
function generateCumulative() {
  let cum = 0;
  return WEEKLY_VOLUME.map(w => {
    cum += w.miles;
    return { ...w, cumMiles: cum };
  });
}

// ─── COMPONENTS ─────────────────────────────────────────────────────────────

// Interpolate hex color toward white by t (0=original, 1=white)
function lerpHexToWhite(hex, t) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const ri = Math.round(r + (255 - r) * t);
  const gi = Math.round(g + (255 - g) * t);
  const bi = Math.round(b + (255 - b) * t);
  return `rgb(${ri},${gi},${bi})`;
}

function WorkoutDot({ type, miles, colors, heatmapMode }) {
  const colorMap = {
    easy: colors.easy,
    tempo: colors.tempo,
    long: colors.long,
    race: colors.race,
    workout: colors.workout || '#60a5fa',
    rest: 'transparent',
  };
  const intensity = miles > 0 ? Math.min(1, miles / 14) : 0;

  let bg, opacity;
  if (miles === 0) {
    bg = 'var(--border-subtle)';
    opacity = 0.3;
  } else if (heatmapMode === 'gradient') {
    // accent color at low opacity for low miles → full opacity for high miles
    // use accent hex directly, interpolate opacity
    bg = colors.accent;
    opacity = 0.15 + intensity * 0.85;
  } else {
    bg = colorMap[type] || 'var(--border-subtle)';
    opacity = 0.3 + intensity * 0.7;
  }

  return (
    <div title={miles > 0 ? `${miles} mi — ${type}` : 'rest'} style={{
      width: 11, height: 11, borderRadius: 2,
      background: bg,
      opacity,
      transition: 'transform var(--dur-fast), opacity var(--dur-fast), background var(--dur-med)',
      cursor: miles > 0 ? 'pointer' : 'default',
      flexShrink: 0,
    }}
    onMouseEnter={e => { if (miles > 0) e.target.style.transform = 'scale(1.4)'; }}
    onMouseLeave={e => { e.target.style.transform = 'scale(1)'; }}
    />
  );
}

}

      e.currentTarget.style.boxShadow = 'none';
    }}>

}

// Simple SVG bar chart
function BarChart({ data, colorKey, colors }) {
  const maxVal = Math.max(...data.map(d => d.miles));
  const width = 600, height = 120;
  const barW = Math.max(2, (width / data.length) - 1);
  const colorMap = { easy: colors.easy, tempo: colors.tempo, long: colors.long, race: colors.race };

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width: '100%', height: 120 }} preserveAspectRatio="none">
      {data.map((d, i) => {
        const h = (d.miles / maxVal) * (height - 10);
        const x = i * (width / data.length);
        return (
          <rect key={i} x={x} y={height - h} width={barW} height={h}
            fill={colors.easy} opacity={0.6 + (d.miles / maxVal) * 0.4}
            rx={1}
          >
            <title>{`Week ${i + 1}: ${d.miles} mi`}</title>
          </rect>
        );
      })}
    </svg>
  );
}

// Sparkline
function Sparkline({ data, color, width = 200, height = 50 }) {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 6) - 3;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width: '100%', height }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      <polyline points={`0,${height} ${pts} ${width},${height}`} fill={color} opacity={0.12} strokeWidth={0} />
    </svg>
  );
}

// Cumulative line chart
function CumulativeChart({ data, accentColor }) {
  const width = 700, height = 200;
  const maxMiles = data[data.length - 1].cumMiles;
  const pts = data.map((d, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - (d.cumMiles / maxMiles) * (height - 20) - 10;
    return `${x},${y}`;
  }).join(' ');

  // Year markers
  const yearMarkers = [];
  data.forEach((d, i) => {
    const yr = d.date.getFullYear();
    if (i > 0 && d.date.getMonth() === 0 && data[i-1].date.getFullYear() !== yr) {
      const x = (i / (data.length - 1)) * width;
      yearMarkers.push({ x, yr });
    }
  });

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width: '100%', height: 200 }}>
      <defs>
        <linearGradient id="cumGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={accentColor} stopOpacity="0.3" />
          <stop offset="100%" stopColor={accentColor} stopOpacity="0.02" />
        </linearGradient>
      </defs>
      {yearMarkers.map(m => (
        <g key={m.yr}>
          <line x1={m.x} y1={0} x2={m.x} y2={height - 18} stroke="var(--border)" strokeWidth="1" strokeDasharray="3,3" opacity="0.5" />
          <text x={m.x + 4} y={height - 6} fill="var(--text-tertiary)" fontSize="9" fontFamily="var(--font-mono)">{m.yr}</text>
        </g>
      ))}
      <polyline points={`0,${height - 10} ${pts} ${width},${height - 10}`} fill="url(#cumGrad)" strokeWidth={0} />
      <polyline points={pts} fill="none" stroke={accentColor} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

// Workout mix donut
function DonutChart({ segments, size = 120 }) {
  const total = segments.reduce((s, seg) => s + seg.value, 0);
  let angle = -Math.PI / 2;
  const cx = size / 2, cy = size / 2, r = size * 0.38, innerR = size * 0.22;
  const arcs = segments.map(seg => {
    const sweep = (seg.value / total) * Math.PI * 2;
    const startAngle = angle;
    angle += sweep;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    const xi1 = cx + innerR * Math.cos(startAngle);
    const yi1 = cy + innerR * Math.sin(startAngle);
    const xi2 = cx + innerR * Math.cos(angle);
    const yi2 = cy + innerR * Math.sin(angle);
    const large = sweep > Math.PI ? 1 : 0;
    return {
      d: `M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${innerR} ${innerR} 0 ${large} 0 ${xi1} ${yi1} Z`,
      color: seg.color,
      label: seg.label,
      pct: Math.round(seg.value / total * 100),
    };
  });
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      {arcs.map((arc, i) => (
        <path key={i} d={arc.d} fill={arc.color} opacity={0.85}>
          <title>{arc.label}: {arc.pct}%</title>
        </path>
      ))}
    </svg>
  );
}

function highlight(text, query) {
  if (!query.trim()) return text;
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  const parts = text.split(regex);
  return parts.map((part, i) =>
    regex.test(part)
      ? <mark key={i} style={{ background: 'rgba(88,166,255,0.35)', color: 'var(--text-primary)', borderRadius: 2, padding: '0 1px' }}>{part}</mark>
      : part
  );
}

          { label: 'Tempo Runs', count: 153, color: colors.tempo },
          { label: 'Long Runs', count: 178, color: colors.long },
        ].map(s => (
          <GlassCard key={s.label}>
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 28, fontWeight: 700, color: 'var(--text-primary)', letterSpacing: '-0.04em' }}>{s.count}</div>
                <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 4, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{s.label}</div>
              </div>
              <div style={{ width: 12, height: 12, borderRadius: 3, background: s.color, marginTop: 4 }} />
            </div>
          </GlassCard>
        ))}
      </div>
    </div>
  );
}

function PerformanceSection({ colors }) {
  const raceData = Array.from({length: 40}, (_, i) => ({
    x: i,
    fiveK: 1040 - i * 3.5 + (Math.random() - 0.5) * 20,
    tenK: 2180 - i * 7 + (Math.random() - 0.5) * 40,
  }));

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        {[
          { label: '5K PR', value: '14:44', sub: 'Winter 2007', color: colors.race },
          { label: '10K PR', value: '30:44', sub: 'Spring 2007', color: colors.tempo },
          { label: '8K XC PR', value: '25:11', sub: 'Fall 2006', color: colors.long },
          { label: 'Mile PR', value: '4:28', sub: 'Winter 2006', color: colors.easy },
        ].map(s => (
          <GlassCard key={s.label}>
            <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>{s.label}</div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 30, fontWeight: 700, color: 'var(--text-primary)', letterSpacing: '-0.04em' }}>{s.value}</div>
                <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 4 }}>{s.sub}</div>
              </div>
              <div style={{ width: 4, borderRadius: 2, background: s.color, height: 48, flexShrink: 0 }} />
            </div>
          </GlassCard>
        ))}
      </div>

      <GlassCard title="5K Progression">
        <svg viewBox="0 0 600 160" style={{ width: '100%', height: 160 }}>
          {(() => {
            const data = raceData.filter(d => d.x % 4 === 0).map(d => d.fiveK);
            const min = Math.min(...data) - 30;
            const max = Math.max(...data) + 30;
            const pts = data.map((v, i) => {
              const x = 20 + (i / (data.length - 1)) * 560;
              const y = 140 - ((v - min) / (max - min)) * 120;
              return { x, y, v };
            });
            const ptStr = pts.map(p => `${p.x},${p.y}`).join(' ');
            return (
              <>
                <polyline points={ptStr} fill="none" stroke={colors.accent} strokeWidth="2" strokeLinejoin="round" />
                {pts.map((p, i) => (
                  <circle key={i} cx={p.x} cy={p.y} r="4" fill={colors.accent} opacity="0.8">
                    <title>{Math.floor(p.v / 60)}:{String(Math.round(p.v % 60)).padStart(2,'0')}</title>
                  </circle>
                ))}
              </>
            );
          })()}
        </svg>
      </GlassCard>
    </div>
  );
}

function RacesSection({ colors }) {
  const [activeTab, setActiveTab] = React.useState('crossCountry');
  const tabs = [
    { id: 'crossCountry', label: 'Cross Country' },
    { id: 'indoorTrack', label: 'Indoor Track' },
    { id: 'outdoorTrack', label: 'Outdoor Track' },
  ];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ display: 'flex', gap: 4, padding: '4px', background: 'var(--bg-elevated)', borderRadius: 10, border: '1px solid var(--border-subtle)', width: 'fit-content' }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            padding: '6px 14px', borderRadius: 7, border: 'none', cursor: 'pointer',
            fontSize: 12, fontWeight: 500, fontFamily: 'var(--font-sans)',
            background: activeTab === t.id ? 'var(--bg-glass)' : 'transparent',
            color: activeTab === t.id ? 'var(--text-primary)' : 'var(--text-secondary)',
            boxShadow: activeTab === t.id ? '0 1px 4px rgba(0,0,0,0.2)' : 'none',
            transition: 'all var(--dur-fast)',
          }}>{t.label}</button>
        ))}
      </div>

      <GlassCard title={`${tabs.find(t => t.id === activeTab).label} Results`}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {RACES[activeTab].map((race, i) => <RaceCard key={i} race={race} />)}
        </div>
        <div style={{ marginTop: 20, padding: '14px 18px', background: 'var(--accent-dim)', border: '1px solid rgba(88, 166, 255, 0.15)', borderRadius: 10 }}>
          <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
            <span style={{ color: 'var(--accent)', fontWeight: 600 }}>4 PRs</span> set in this event · Most improved: {tabs.find(t => t.id === activeTab).label}
          </div>
        </div>
      </GlassCard>
    </div>
  );
}

function PatternsSection({ colors }) {
  // Day of week pattern
  const dowLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dowData = [38, 42, 44, 41, 36, 58, 52];
  const maxDow = Math.max(...dowData);

  // Monthly average
  const monthData = [32, 30, 36, 40, 44, 38, 36, 34, 40, 44, 42, 36];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <GlassCard title="Avg Miles by Day of Week">
          <div style={{ display: 'flex', gap: 6, alignItems: 'flex-end', height: 100 }}>
            {dowData.map((v, i) => (
              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                <div style={{ width: '100%', borderRadius: '3px 3px 0 0', background: colors.accent, opacity: 0.4 + (v / maxDow) * 0.6, height: `${(v / maxDow) * 80}px`, transition: 'height 0.3s var(--ease)' }} />
                <div style={{ fontSize: 9, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>{dowLabels[i].slice(0,2)}</div>
              </div>
            ))}
          </div>
        </GlassCard>

        <GlassCard title="Avg Weekly Miles by Month">
          <div style={{ display: 'flex', gap: 4, alignItems: 'flex-end', height: 100 }}>
            {monthData.map((v, i) => {
              const max = Math.max(...monthData);
              return (
                <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                  <div style={{ width: '100%', borderRadius: '3px 3px 0 0', background: colors.accent, opacity: 0.4 + (v / max) * 0.6, height: `${(v / max) * 80}px` }} />
                  <div style={{ fontSize: 8, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>{MONTHS[i].slice(0,1)}</div>
                </div>
              );
            })}
          </div>
        </GlassCard>
      </div>

      <GlassCard title="Streak Analysis">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
          {[
            { label: 'Longest Streak', value: '47', unit: 'days' },
            { label: 'Current Streak', value: '12', unit: 'days' },
            { label: 'Total Streaks 7d+', value: '28', unit: 'streaks' },
          ].map(s => (
            <div key={s.label}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 32, fontWeight: 700, color: 'var(--text-primary)', letterSpacing: '-0.04em' }}>
                {s.value}
                <span style={{ fontSize: 12, color: 'var(--text-secondary)', fontWeight: 400, marginLeft: 4 }}>{s.unit}</span>
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 4 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </GlassCard>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [activeSection, setActiveSection] = React.useState('overview');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const colors = {
    accent: tweaks.accentColor,
    easy: tweaks.easyColor,
    tempo: tweaks.tempoColor,
    long: tweaks.longColor,
    race: tweaks.raceColor,
    workout: '#60a5fa',
  };

  // Apply accent CSS var
  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    document.documentElement.style.setProperty('--accent-glow', tweaks.accentColor + '26');
    document.documentElement.style.setProperty('--accent-dim', tweaks.accentColor + '14');
  }, [tweaks.accentColor]);

  const sectionMap = {
    overview: <OverviewSection colors={colors} />,
    volume: <VolumeSection colors={colors} />,
    'workout-mix': <WorkoutMixSection colors={colors} />,
    performance: <PerformanceSection colors={colors} />,
    races: <RacesSection colors={colors} />,
    patterns: <PatternsSection colors={colors} />,
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden', background: 'var(--bg-base)', position: 'relative' }}>

      {/* Background texture */}
      <div style={{
        position: 'fixed', inset: 0, zIndex: 0, pointerEvents: 'none',
        background: 'radial-gradient(ellipse 80% 50% at 50% -10%, rgba(88,166,255,0.06) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 110%, rgba(167,139,250,0.04) 0%, transparent 60%)',
      }} />

      {/* Top nav bar */}
      <header style={{
        flexShrink: 0,
        position: 'sticky', top: 0, zIndex: 20,
        background: 'var(--bg-glass)',
        backdropFilter: 'blur(20px)',
        WebkitBackdropFilter: 'blur(20px)',
        borderBottom: '1px solid var(--border-subtle)',
      }}>
        {/* Top strip: wordmark + strava button */}
        <div style={{
          maxWidth: 1100, margin: '0 auto',
          padding: '0 32px',
          height: 48,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          gap: 16,
        }}>
          {/* Wordmark */}
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-primary)', letterSpacing: '-0.02em' }}>
              College Running Log
            </span>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-tertiary)', letterSpacing: '0.06em' }}>
              2003 – 2007
            </span>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-secondary)' }}>
              · 6,120 mi
            </span>
          </div>

          {/* Strava button */}
          <a
            href="https://www.strava.com/dashboard"
            target="_blank"
            rel="noopener noreferrer"
            style={{
              display: 'flex', alignItems: 'center', gap: 7,
              padding: '6px 12px',
              borderRadius: 7,
              background: 'rgba(252, 76, 2, 0.08)',
              border: '1px solid rgba(252, 76, 2, 0.25)',
              color: '#fc4c02',
              fontFamily: 'var(--font-sans)', fontSize: 11, fontWeight: 600,
              textDecoration: 'none',
              flexShrink: 0,
              transition: 'all var(--dur-fast)',
              whiteSpace: 'nowrap',
            }}
            onMouseEnter={e => {
              e.currentTarget.style.background = 'rgba(252, 76, 2, 0.14)';
              e.currentTarget.style.borderColor = 'rgba(252, 76, 2, 0.5)';
            }}
            onMouseLeave={e => {
              e.currentTarget.style.background = 'rgba(252, 76, 2, 0.08)';
              e.currentTarget.style.borderColor = 'rgba(252, 76, 2, 0.25)';
            }}
          >
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#fc4c02">
              <path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.599h4.172L10.463 0l-7 13.828h4.169"/>
            </svg>
            Strava API Dashboard
          </a>
        </div>

        {/* Nav tabs row */}
        <div style={{
          maxWidth: 1100, margin: '0 auto',
          padding: '0 32px',
          display: 'flex', alignItems: 'flex-end', gap: 0,
        }}>
          {NAV_ITEMS.map(item => {
            const isActive = activeSection === item.id;
            return (
              <button key={item.id} onClick={() => setActiveSection(item.id)} style={{
                display: 'flex', alignItems: 'center', gap: 7,
                padding: '10px 16px 11px',
                border: 'none', borderBottom: isActive ? '2px solid var(--accent)' : '2px solid transparent',
                background: 'transparent',
                color: isActive ? 'var(--accent)' : 'var(--text-secondary)',
                fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: isActive ? 600 : 400,
                cursor: 'pointer',
                transition: 'all var(--dur-fast)',
                whiteSpace: 'nowrap',
                marginBottom: -1,
              }}
              onMouseEnter={e => { if (!isActive) e.currentTarget.style.color = 'var(--text-primary)'; }}
              onMouseLeave={e => { if (!isActive) e.currentTarget.style.color = 'var(--text-secondary)'; }}
              >
                <span style={{ fontSize: 13 }}>{item.icon}</span>
                <span>{item.label}</span>
              </button>
            );
          })}
        </div>
      </header>

      {/* Main content */}
      <main style={{ flex: 1, overflow: 'hidden auto', position: 'relative', zIndex: 1 }}>
        <div style={{ maxWidth: 1100, margin: '0 auto', padding: '32px 32px 80px' }}>
          {/* Page header */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-tertiary)', marginBottom: 6 }}>
              Strava Before Strava · Aug 31, 2003 – May 12, 2007
            </div>
            <h1 style={{ fontSize: 26, fontWeight: 700, color: 'var(--text-primary)', letterSpacing: '-0.03em' }}>
              {NAV_ITEMS.find(n => n.id === activeSection)?.label}
            </h1>
          </div>

          {sectionMap[activeSection]}
        </div>
      </main>

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection title="Accent Color">
          <TweakColor id="accentColor" label="Primary Accent" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        </TweakSection>
        <TweakSection title="Workout Colors">
          <TweakColor id="easyColor" label="Easy Run" value={tweaks.easyColor} onChange={v => setTweak('easyColor', v)} />
          <TweakColor id="tempoColor" label="Tempo" value={tweaks.tempoColor} onChange={v => setTweak('tempoColor', v)} />
          <TweakColor id="longColor" label="Long Run" value={tweaks.longColor} onChange={v => setTweak('longColor', v)} />
          <TweakColor id="raceColor" label="Race" value={tweaks.raceColor} onChange={v => setTweak('raceColor', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
